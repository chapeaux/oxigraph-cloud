apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikv-cluster.fullname" . }}-pd-headless
  labels:
    {{- include "tikv-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: pd
spec:
  clusterIP: None
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pd
