apiVersion: v1
kind: Service
metadata:
  name: {{ include "tikv-cluster.fullname" . }}-pd
  labels:
    {{- include "tikv-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: pd
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
      targetPort: 2379
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pd
