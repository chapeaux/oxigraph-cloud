apiVersion: v1
kind: Service
metadata:
  name: {{ include "oxigraph-cloud.headlessServiceName" . }}
  labels:
    {{- include "oxigraph-cloud.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oxigraph-cloud.selectorLabels" . | nindent 4 }}
