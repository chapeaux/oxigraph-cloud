# =============================================================================
# Oxigraph Cloud — TiKV backend overlay
# =============================================================================
# Usage:
#   helm install tikv-cluster helm/tikv-cluster
#   helm install oxigraph helm/oxigraph-cloud -f helm/oxigraph-cloud/values-tikv.yaml
# =============================================================================

image:
  repository: quay.io/ldary/oxigraph-cloud
  tag: "0.7.4-tikv"
  pullPolicy: IfNotPresent

backend: tikv

tikv:
  pdEndpoints:
    - "tikv-cluster-pd:2379"
