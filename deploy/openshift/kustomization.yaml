apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Extends the base K8s manifests with OpenShift-specific resources
resources:
  - ../k8s
  - route.yaml
  - serviceaccount.yaml

patches:
  # Patch deployment to use OpenShift-compatible security context
  - target:
      kind: Deployment
      name: oxigraph-cloud
    patch: |
      - op: remove
        path: /spec/template/spec/securityContext/runAsUser
