apiVersion: v1
kind: ServiceAccount
metadata:
  name: oxigraph-cloud
  labels:
    app.kubernetes.io/name: oxigraph-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oxigraph-cloud
  labels:
    app.kubernetes.io/name: oxigraph-cloud
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oxigraph-cloud
  labels:
    app.kubernetes.io/name: oxigraph-cloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oxigraph-cloud
subjects:
  - kind: ServiceAccount
    name: oxigraph-cloud
