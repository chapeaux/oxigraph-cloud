{{- if and .Values.persistence.enabled (eq .Values.backend.type "rocksdb") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "oxigraph-cloud.fullname" . }}-data
  labels:
    {{- include "oxigraph-cloud.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
