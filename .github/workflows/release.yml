name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  QUAY_REGISTRY: quay.io
  QUAY_IMAGE: quay.io/ldary/oxigraph-cloud
  HELM_CHART_DIR: deploy/helm/oxigraph-cloud

jobs:
  # ---------------------------------------------------------------------------
  # Build release binary (linux-amd64)
  # ---------------------------------------------------------------------------
  build-binary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p oxigraph-server

      - name: Package binary artifact
        run: |
          mkdir -p dist
          cp target/release/oxigraph-cloud dist/oxigraph-cloud-linux-amd64
          chmod +x dist/oxigraph-cloud-linux-amd64
          sha256sum dist/oxigraph-cloud-linux-amd64 > dist/oxigraph-cloud-linux-amd64.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-linux-amd64
          path: dist/
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Build and push container images (all variants) to GHCR and Quay.io
  # ---------------------------------------------------------------------------
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: default
            containerfile: Containerfile
            tag_suffix: ""
            extra_features: ""
          - variant: tikv
            containerfile: Containerfile.tikv
            tag_suffix: "-tikv"
            extra_features: ""
          - variant: otel
            containerfile: Containerfile
            tag_suffix: "-otel"
            extra_features: "otel"
          - variant: tikv-otel
            containerfile: Containerfile.tikv
            tag_suffix: "-tikv-otel"
            extra_features: "otel"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.containerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}${{ matrix.tag_suffix }}
            ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.VERSION }}${{ matrix.tag_suffix }}
            ${{ env.QUAY_IMAGE }}:latest${{ matrix.tag_suffix }}
          build-args: |
            EXTRA_FEATURES=${{ matrix.extra_features }}
          platforms: linux/amd64
          cache-from: type=gha,scope=release-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.variant }}

  # ---------------------------------------------------------------------------
  # Package and push Helm chart as OCI artifact
  # ---------------------------------------------------------------------------
  helm-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version to match release tag
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" ${{ env.HELM_CHART_DIR }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" ${{ env.HELM_CHART_DIR }}/Chart.yaml

      - name: Lint Helm chart
        run: helm lint ${{ env.HELM_CHART_DIR }}

      - name: Package Helm chart
        run: helm package ${{ env.HELM_CHART_DIR }} --destination dist/

      - name: Log in to OCI registry for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to OCI registry
        run: helm push dist/oxigraph-cloud-${{ steps.version.outputs.VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  github-release:
    needs: [build-binary, build-container, helm-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-linux-amd64
          path: dist/

      - name: Download Helm chart artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: helm-chart
          path: dist/

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get previous tag for changelog range
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            # First release — include all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "$COMMITS"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Oxigraph Cloud ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Oxigraph Cloud ${{ steps.version.outputs.VERSION }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Container Images
            | Variant | Image |
            |---------|-------|
            | RocksDB + SHACL | `quay.io/ldary/oxigraph-cloud:${{ steps.version.outputs.VERSION }}` |
            | TiKV + SHACL | `quay.io/ldary/oxigraph-cloud:${{ steps.version.outputs.VERSION }}-tikv` |
            | RocksDB + SHACL + OTel | `quay.io/ldary/oxigraph-cloud:${{ steps.version.outputs.VERSION }}-otel` |
            | TiKV + SHACL + OTel | `quay.io/ldary/oxigraph-cloud:${{ steps.version.outputs.VERSION }}-tikv-otel` |

            ```bash
            docker pull quay.io/ldary/oxigraph-cloud:${{ steps.version.outputs.VERSION }}
            ```

            ### Helm Chart
            Install from OCI registry:
            ```bash
            helm install oxigraph-cloud \
              oci://${{ env.REGISTRY }}/${{ github.repository }}/charts/oxigraph-cloud \
              --version ${{ steps.version.outputs.VERSION }}
            ```

            Or with custom values:
            ```bash
            helm install oxigraph-cloud \
              oci://${{ env.REGISTRY }}/${{ github.repository }}/charts/oxigraph-cloud \
              --version ${{ steps.version.outputs.VERSION }} \
              -f my-values.yaml
            ```

            ### Binary
            Download the `oxigraph-cloud-linux-amd64` binary from the assets below.
            Verify the checksum: `sha256sum -c oxigraph-cloud-linux-amd64.sha256`
          files: |
            dist/oxigraph-cloud-linux-amd64
            dist/oxigraph-cloud-linux-amd64.sha256
            dist/*.tgz
