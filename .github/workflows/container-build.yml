name: Container Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  QUAY_REGISTRY: quay.io
  QUAY_IMAGE: quay.io/ldary/oxigraph-cloud

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - variant: default
            containerfile: Containerfile
            tag_suffix: ""
            extra_features: ""
          - variant: tikv
            containerfile: Containerfile.tikv
            tag_suffix: "-tikv"
            extra_features: ""
          - variant: otel
            containerfile: Containerfile
            tag_suffix: "-otel"
            extra_features: "otel"
          - variant: tikv-otel
            containerfile: Containerfile.tikv
            tag_suffix: "-tikv-otel"
            extra_features: "otel"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.containerfile }}
          push: true
          tags: |
            ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.VERSION }}${{ matrix.tag_suffix }}
            ${{ env.QUAY_IMAGE }}:latest${{ matrix.tag_suffix }}
          build-args: |
            EXTRA_FEATURES=${{ matrix.extra_features }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
