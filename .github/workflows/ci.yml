name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run unit tests
        run: cargo test --workspace

  test-tikv:
    name: Integration Tests (TiKV)
    runs-on: ubuntu-latest
    # Allow failure until TiKV integration is fully stabilized
    continue-on-error: true
    services:
      pd:
        image: pingcap/pd:latest
        ports:
          - "2379:2379"
          - "2380:2380"
        env:
          PD_NAME: pd0
          PD_CLIENT_URLS: http://0.0.0.0:2379
          PD_PEER_URLS: http://0.0.0.0:2380
          PD_INITIAL_CLUSTER: pd0=http://pd:2380
        options: >-
          --health-cmd "curl -f http://localhost:2379/pd/api/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      tikv:
        image: pingcap/tikv:latest
        ports:
          - "20160:20160"
        env:
          PD_ENDPOINTS: pd:2379
        options: >-
          --health-cmd "true"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tikv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tikv-

      - name: Wait for TiKV cluster to be ready
        run: |
          echo "Waiting for PD and TiKV to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:2379/pd/api/v1/stores 2>/dev/null | grep -q '"count"'; then
              echo "TiKV cluster is ready"
              exit 0
            fi
            echo "Attempt $i/30: TiKV not ready yet..."
            sleep 5
          done
          echo "TiKV cluster did not become ready in time"
          exit 1

      - name: Run TiKV integration tests
        env:
          TIKV_PD_ENDPOINTS: "127.0.0.1:2379"
        run: cargo test --workspace --features integration-tests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
