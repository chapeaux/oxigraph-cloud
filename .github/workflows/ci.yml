name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build (debug)
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --workspace --release

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run unit tests
        run: cargo test --workspace

  test-integration:
    name: Integration Tests (TiKV)
    runs-on: ubuntu-latest
    needs: [build]
    # Allow failure — TiKV integration is not implemented yet.
    # Remove continue-on-error once Phase 2 is complete.
    continue-on-error: true
    services:
      pd:
        image: pingcap/pd:latest
        ports:
          - 2379:2379
          - 2380:2380
        options: >-
          --health-cmd "wget -qO- http://localhost:2379/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          # Single-node PD config for CI
          PD_NAME: pd0
          PD_CLIENT_URLS: http://0.0.0.0:2379
          PD_PEER_URLS: http://0.0.0.0:2380
          PD_INITIAL_CLUSTER: pd0=http://pd:2380
      tikv:
        image: pingcap/tikv:latest
        ports:
          - 20160:20160
        options: >-
          --health-cmd "wget -qO- http://localhost:20180/status || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        env:
          PD_ENDPOINTS: pd:2379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Run integration tests
        env:
          TIKV_PD_ENDPOINTS: 127.0.0.1:2379
        run: cargo test --workspace --features integration-tests

  container-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    # Only build container on main branch pushes or version tags
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Build container image with podman
        run: |
          podman build \
            -t oxigraph-cloud-native:${{ github.sha }} \
            -f Containerfile \
            .

      - name: Verify container starts
        run: |
          # Basic smoke test: container builds and binary executes
          podman run --rm oxigraph-cloud-native:${{ github.sha }} --help || true
