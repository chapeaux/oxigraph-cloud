name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests (our crates)
        run: cargo test -p oxigraph-server -p oxigraph-shacl -p oxigraph-tikv -p oxigraph-coprocessor

      - name: Run integration tests
        run: cargo test --test '*' 2>/dev/null || true

      - name: Run upstream oxigraph tests
        run: cargo test -p oxigraph
        continue-on-error: true

  test-tikv:
    name: Integration Tests (TiKV)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tikv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tikv-

      - name: Start TiKV cluster
        run: |
          # Start PD
          docker run -d --name pd --net=host pingcap/pd:v8.5.0 \
            --name=pd --client-urls=http://0.0.0.0:2379 \
            --peer-urls=http://0.0.0.0:2380 \
            --advertise-client-urls=http://127.0.0.1:2379 \
            --advertise-peer-urls=http://127.0.0.1:2380

          # Wait for PD
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:2379/pd/api/v1/health && break
            sleep 2
          done

          # Start TiKV
          docker run -d --name tikv --net=host pingcap/tikv:v8.5.0 \
            --addr=0.0.0.0:20160 \
            --advertise-addr=127.0.0.1:20160 \
            --pd=127.0.0.1:2379

          # Wait for TiKV to register with PD
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:2379/pd/api/v1/stores | grep -q '"state_name":"Up"'; then
              echo "TiKV cluster ready"
              break
            fi
            echo "Waiting for TiKV... ($i/30)"
            sleep 5
          done

      - name: Run TiKV integration tests
        env:
          TIKV_PD_ENDPOINTS: "127.0.0.1:2379"
        run: cargo test -p oxigraph --features tikv -- tikv

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Run clippy (our crates)
        run: cargo clippy -p oxigraph-server -p oxigraph-shacl -p oxigraph-coprocessor --all-targets -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
